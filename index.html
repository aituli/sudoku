<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>数独</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    #app {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 460px;
      width: 100%;
    }

    /* ====== Board ====== */
    .sudoku-board {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 1px;
      background: #374151;
      border: 3px solid #374151;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
      aspect-ratio: 1;
    }

    .sudoku-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-size: clamp(16px, 4.5vw, 22px);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      aspect-ratio: 1;
    }

    .sudoku-cell:hover { background: #F3F4F6; }
    .sudoku-cell.given { color: #1A1A2E; font-weight: 700; }
    .sudoku-cell.user { color: #6C63FF; }
    .sudoku-cell.error { color: #EF4444; background: #FEF2F2; }
    .sudoku-cell.selected { background: #DDD6FE; }
    .sudoku-cell.related { background: #F3F4F6; }
    .sudoku-cell.highlight { background: #EDE9FE; }
    .sudoku-cell.selected.error { background: #FECACA; }

    .sudoku-cell.box-right { border-right: 2.5px solid #374151; }
    .sudoku-cell.box-bottom { border-bottom: 2.5px solid #374151; }

    /* ====== Controls ====== */
    .controls { display: flex; flex-direction: column; gap: 16px; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .difficulty-bar { display: flex; gap: 8px; }

    .btn {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-difficulty {
      padding: 8px 16px;
      font-size: 14px;
      background: #F3F4F6;
      color: #374151;
    }
    .btn-difficulty:hover { background: #E5E7EB; }
    .btn-difficulty.active {
      background: linear-gradient(135deg, #6C63FF, #8B85FF);
      color: #fff;
      box-shadow: 0 4px 12px rgba(108, 99, 255, 0.4);
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .numpad .btn:last-child {
      grid-column: 5;
    }

    .btn-num {
      padding: 14px;
      font-size: 20px;
      background: #F3F4F6;
      color: #374151;
      border-radius: 12px;
    }
    .btn-num:hover { background: #E5E7EB; transform: scale(1.05); }
    .btn-num:active { transform: scale(0.95); }

    .btn-erase {
      padding: 14px;
      font-size: 20px;
      background: #FEF2F2;
      color: #EF4444;
      border-radius: 12px;
    }
    .btn-erase:hover { background: #FECACA; }

    .btn-hint {
      padding: 14px;
      font-size: 20px;
      background: #FFF7ED;
      color: #D97706;
      border-radius: 12px;
    }
    .btn-hint:hover { background: #FED7AA; }

    .btn-action {
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 10px;
    }
    .btn-restart {
      background: linear-gradient(135deg, #10B981, #34D399);
      color: #fff;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    .btn-restart:hover { box-shadow: 0 4px 16px rgba(16, 185, 129, 0.5); transform: scale(1.03); }
    .btn-restart:active { transform: scale(0.97); }

    /* ====== Hint Panel ====== */
    .hint-panel {
      display: none;
      background: linear-gradient(135deg, #FFF7ED, #FEF3C7);
      border: 1.5px solid #F59E0B;
      border-radius: 12px;
      padding: 14px 16px;
      animation: slideDown 0.3s ease-out;
    }

    .hint-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .hint-technique {
      font-size: 14px;
      font-weight: 700;
      color: #92400E;
      background: #FDE68A;
      padding: 3px 10px;
      border-radius: 6px;
    }

    .hint-close {
      background: none;
      color: #92400E;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 6px;
      min-width: auto;
    }
    .hint-close:hover { background: #FDE68A; }

    .hint-body {
      font-size: 14px;
      line-height: 1.7;
      color: #78350F;
    }
    .hint-body p { margin: 2px 0; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-message {
      display: none;
      justify-content: center;
      align-items: center;
      padding: 16px;
      background: linear-gradient(135deg, #D1FAE5, #A7F3D0);
      border-radius: 12px;
      font-size: 20px;
      font-weight: 700;
      color: #065F46;
      animation: pop 0.4s ease-out;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Mobile */
    @media (max-width: 480px) {
      #app { padding: 16px; border-radius: 16px; }
      .btn-difficulty { padding: 6px 12px; font-size: 13px; }
      .btn-num { padding: 10px; font-size: 18px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
